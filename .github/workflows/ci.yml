name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk:
    name: payweave (lint · typecheck · build · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint, typecheck, build, test
        run: pnpm turbo lint typecheck build test --filter=payweave

      - name: Check exports/imports alignment
        run: |
          node packages/payweave/scripts/check-exports.mjs
          node packages/payweave/scripts/check-imports.mjs
