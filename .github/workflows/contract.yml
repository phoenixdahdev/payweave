name: Contract

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch: {}

jobs:
  stripe-quickstart:
    name: Stripe contract quickstart
    runs-on: ubuntu-latest
    if: ${{ secrets.STRIPE_TEST_SECRET != '' }}
    env:
      STRIPE_TEST_SECRET: ${{ secrets.STRIPE_TEST_SECRET }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build payweave (SDK + CLI)
        run: pnpm turbo build --filter=payweave

      - name: payweave status --throw (pre-flight)
        working-directory: packages/payweave
        run: node dist/cli/index.js status --throw --config e2e/fixtures/status-project/payweave.ts

      - name: Stripe contract quickstart (test:e2e)
        run: pnpm --filter payweave test:e2e
