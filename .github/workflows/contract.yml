name: Contract

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch: {}

jobs:
  check-secrets:
    name: Check for provider test secrets
    runs-on: ubuntu-latest
    outputs:
      has-stripe: ${{ steps.check.outputs.has-stripe }}
    steps:
      - id: check
        env:
          STRIPE_TEST_SECRET: ${{ secrets.STRIPE_TEST_SECRET }}
        run: |
          if [ -n "$STRIPE_TEST_SECRET" ]; then
            echo "has-stripe=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-stripe=false" >> "$GITHUB_OUTPUT"
          fi

  stripe-quickstart:
    name: Stripe contract quickstart
    needs: check-secrets
    if: needs.check-secrets.outputs.has-stripe == 'true'
    runs-on: ubuntu-latest
    env:
      STRIPE_TEST_SECRET: ${{ secrets.STRIPE_TEST_SECRET }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build payweave (SDK + CLI)
        run: pnpm turbo build --filter=payweave

      - name: payweave status --throw (pre-flight)
        working-directory: packages/payweave
        run: node dist/cli/index.js status --throw --config e2e/fixtures/status-project/payweave.ts

      - name: Stripe contract quickstart (test:e2e)
        run: pnpm --filter payweave test:e2e
