name: Release

on:
  push:
    branches: [main]
    paths:
      - "packages/payweave/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write
  checks: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Changesets — version & publish (payweave)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Wait for CI to pass
        if: github.event_name == 'push'
        uses: lewagon/wait-on-check-action@v1.8.1
        with:
          ref: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          running-workflow-name: "Changesets — version & publish (payweave)"

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Update npm (trusted publishing needs npm >=11.5.1; Node 22 bundles 10.x)
        run: npm install -g npm@latest

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify before release
        run: pnpm turbo lint typecheck build test --filter=payweave

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
